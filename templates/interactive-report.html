<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Juno Returns Utilization</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{font-family:'Outfit',sans-serif;font-weight:300;margin:0;background:#F8F9FA;color:#1E1E1E}
.hdr{background:#013A2F;padding:16px 32px;display:flex;align-items:center}
.logo{color:#fff;font-size:1.8em;font-weight:500;letter-spacing:-.01em}.o{color:#1CE49B}
.main{padding:24px 32px}
h1{color:#013A2F;font-weight:300;font-size:1.5em;margin:0 0 6px}
h2{color:#013A2F;font-weight:400;margin:28px 0 10px;font-size:.78em;text-transform:uppercase;letter-spacing:.1em}
.meta{color:#888;font-size:.82em;margin:0 0 16px}
.warn-banner{background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:12px 16px;margin:0 0 16px;color:#991b1b;font-size:.85em}
.ctrl{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:0 0 16px}
#srch{padding:8px 14px;border:1px solid #d1d5db;border-radius:8px;font-family:'Outfit',sans-serif;font-size:.86em;width:260px;outline:none;background:#fff}
#srch:focus{border-color:#1CE49B;box-shadow:0 0 0 3px rgba(28,228,155,.15)}
.flt{display:flex;gap:6px;flex-wrap:wrap}
.fb{padding:6px 14px;border-radius:20px;border:1.5px solid #d1d5db;background:#fff;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.8em;font-weight:400;transition:all .15s}
.fb:hover{border-color:#013A2F;color:#013A2F}
.fb.active{background:#013A2F;color:#fff;border-color:#013A2F}
.fb.fc{border-color:#fca5a5;color:#dc2626}.fb.fc.active{background:#dc2626;border-color:#dc2626;color:#fff}
.fb.fw{border-color:#fcd34d;color:#d97706}.fb.fw.active{background:#d97706;border-color:#d97706;color:#fff}
.fb.fwc{border-color:#fde68a;color:#ca8a04}.fb.fwc.active{background:#ca8a04;border-color:#ca8a04;color:#fff}
.fb.fok{border-color:#6ee7b7;color:#059669}.fb.fok.active{background:#059669;border-color:#059669;color:#fff}
.stats{display:flex;gap:14px;flex-wrap:wrap;margin:0 0 20px}
.sb{background:#fff;border-radius:10px;padding:14px 20px;border:1px solid #e2e8e2;min-width:90px}
.sb .v{font-size:1.9em;font-weight:500;color:#013A2F}
.sb .l{color:#999;font-size:.74em;text-transform:uppercase;letter-spacing:.08em;margin-top:4px}
table{border-collapse:collapse;width:100%;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #e2e8e2;margin-bottom:28px;font-size:.86em}
th{background:#013A2F;color:#fff;padding:9px 12px;text-align:left;font-weight:400;font-size:.77em;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{background:#024a3c}
.si{display:inline-block;margin-left:5px;opacity:.6;font-size:.9em}
td{padding:7px 12px;border-bottom:1px solid #f0f4f0}
tr:hover td{background:#f0fbf6!important}
.CR td{background:#fef2f2}.WA td{background:#fffbeb}.WC td{background:#fefce8}
.up{color:#059669;font-weight:500}.dn{color:#dc2626;font-weight:500}
.badge{display:inline-block;padding:2px 9px;border-radius:12px;font-size:.78em;font-weight:500}
.bCR{background:#fee2e2;color:#dc2626}.bWA{background:#fef3c7;color:#d97706}
.bWC{background:#fefce8;color:#ca8a04}.bOK{background:#d1fae5;color:#059669}
.pb{background:#e5e7eb;border-radius:4px;height:8px;width:100%;margin-top:4px}
.pbi{height:8px;border-radius:4px;transition:width .3s}
.res-count{color:#888;font-size:.82em;margin:-8px 0 10px}
#ovrl{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:center;justify-content:center}
#ovrl.show{display:flex}
#obox{background:#fff;border-radius:14px;padding:28px 32px;max-width:480px;width:90%;position:relative;max-height:85vh;overflow-y:auto}
#oclose{position:absolute;top:14px;right:18px;font-size:1.4em;cursor:pointer;color:#999;border:none;background:none;line-height:1}
.dh{font-size:1.1em;font-weight:500;color:#013A2F;margin:0 0 4px}
.dsub{color:#888;font-size:.82em;margin:0 0 18px}
.drow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f4f0}
.drow:last-child{border-bottom:none}
.dlbl{color:#888;font-size:.82em}
.dval{font-weight:500;font-size:.95em}
</style>
</head>
<body>
<div class="hdr"><div class="logo">JUN<span class="o">O</span>.</div></div>
<div class="main">
<h1>Returns Utilization Report</h1>
<p class="meta" id="pmeta"></p>
<div id="warnbanner"></div>
<div class="ctrl">
  <input id="srch" type="text" placeholder="Search organizations…" oninput="onSearch()">
  <div class="flt" id="fltbar"></div>
</div>
<div class="stats" id="sbar"></div>
<div class="res-count" id="rcount"></div>
<h2 id="mhdr">Top Movers</h2>
<table id="mtbl">
<thead><tr>
<th data-c="n" data-t="s">Org<span class="si" id="sin"></span></th>
<th data-c="p" data-t="n">Purchased<span class="si" id="sip"></span></th>
<th data-c="u" data-t="n">Used<span class="si" id="siu"></span></th>
<th data-c="up" data-t="n">Util %<span class="si" id="siup"></span></th>
<th data-c="du" data-t="n">&Delta; Used<span class="si" id="sidu"></span></th>
<th data-c="dutil" data-t="n">&Delta; Util %<span class="si" id="sidutil"></span></th>
<th>Status</th>
</tr></thead>
<tbody id="mbdy"></tbody>
</table>
<h2 id="ahdr">All Orgs</h2>
<table id="atbl">
<thead><tr>
<th data-c="n" data-t="s" data-tbl="a">Org<span class="si" id="ain"></span></th>
<th data-c="p" data-t="n" data-tbl="a">Purchased<span class="si" id="aip"></span></th>
<th data-c="u" data-t="n" data-tbl="a">Used<span class="si" id="aiu"></span></th>
<th data-c="up" data-t="n" data-tbl="a">Util %<span class="si" id="aiup"></span></th>
<th data-c="du" data-t="n" data-tbl="a">&Delta; Used<span class="si" id="aidu"></span></th>
<th data-c="dutil" data-t="n" data-tbl="a">&Delta; Util %<span class="si" id="aidutil"></span></th>
<th>Status</th>
</tr></thead>
<tbody id="abdy"></tbody>
</table>
</div>
<div id="ovrl" onclick="if(event.target===this)closeD()">
<div id="obox">
<button id="oclose" onclick="closeD()">&times;</button>
<div id="ocnt"></div>
</div>
</div>
<script>
const DATA=__DATA_PLACEHOLDER__;
const META=__META_PLACEHOLDER__;
const WARN=__WARN_PLACEHOLDER__;

// State
let state={f:'all',q:'',mc:'dutil',md:-1,ac:'up',ad:-1};

// Init meta
document.getElementById('pmeta').textContent=META.today+' · Δ vs '+META.snap+' · '+DATA.length+' orgs';
if(WARN){
  const b=document.getElementById('warnbanner');
  b.innerHTML='<div class="warn-banner">'+WARN+'</div>';
}

// Filter buttons
const FILTERS=[
  {k:'all',label:'All',cls:''},
  {k:'CRITICAL',label:'Critical',cls:'fc'},
  {k:'WARNING',label:'Warning',cls:'fw'},
  {k:'WATCH',label:'Watch',cls:'fwc'},
  {k:'OK',label:'OK',cls:'fok'}
];
const fbar=document.getElementById('fltbar');
FILTERS.forEach(f=>{
  const b=document.createElement('button');
  b.className='fb '+(f.cls||'')+(f.k==='all'?' active':'');
  b.dataset.f=f.k;
  b.textContent=f.label;
  b.onclick=()=>{state.f=f.k;fbar.querySelectorAll('.fb').forEach(x=>x.classList.remove('active'));b.classList.add('active');render();};
  fbar.appendChild(b);
});

function filtered(){
  let d=DATA;
  if(state.f!=='all') d=d.filter(o=>o.st===state.f);
  if(state.q){const q=state.q.toLowerCase();d=d.filter(o=>o.n.toLowerCase().includes(q));}
  return d;
}

function sortArr(arr,col,dir){
  return [...arr].sort((a,b)=>{
    const av=a[col],bv=b[col];
    if(typeof av==='string') return dir*(av.localeCompare(bv));
    return dir*(av-bv);
  });
}

function badge(st){
  const cls={CRITICAL:'bCR',WARNING:'bWA',WATCH:'bWC',OK:'bOK'}[st]||'bOK';
  return '<span class="badge '+cls+'">'+st+'</span>';
}

function pbar(up){
  const pct=Math.min(up,100);
  const col=up>=90?'#dc2626':up>=80?'#d97706':up>=70?'#ca8a04':'#059669';
  return '<div class="pb"><div class="pbi" style="width:'+pct+'%;background:'+col+'"></div></div>';
}

function rowHtml(o){
  const sc=o.st==='CRITICAL'?'CR':o.st==='WARNING'?'WA':o.st==='WATCH'?'WC':'';
  const dc=o.dutil>0?'up':o.dutil<0?'dn':'';
  const ds=o.dutil>0?'+':'';const dus=o.du>0?'+':'';
  return '<tr class="'+sc+'" onclick="drillDown(\''+o.id+'\')" style="cursor:pointer">'
    +'<td>'+o.n+'</td><td>'+o.p+'</td><td>'+o.u+'</td>'
    +'<td>'+o.up.toFixed(1)+'%</td>'
    +'<td class="'+dc+'">'+dus+o.du+'</td>'
    +'<td class="'+dc+'">'+ds+o.dutil.toFixed(1)+'%</td>'
    +'<td>'+badge(o.st)+'</td></tr>';
}

function renderStats(d){
  const tot=d.length,cr=d.filter(o=>o.st==='CRITICAL').length,wa=d.filter(o=>o.st==='WARNING').length,wc=d.filter(o=>o.st==='WATCH').length,ok=d.filter(o=>o.st==='OK').length;
  const tpu=d.reduce((s,o)=>s+o.p,0),tuu=d.reduce((s,o)=>s+o.u,0);
  const ov=tpu?+(tuu/tpu*100).toFixed(1):0;
  document.getElementById('sbar').innerHTML=
    '<div class="sb"><div class="v">'+tot+'</div><div class="l">Total Orgs</div></div>'
    +'<div class="sb" style="border-color:#fca5a5"><div class="v" style="color:#dc2626">'+cr+'</div><div class="l">Critical</div></div>'
    +'<div class="sb" style="border-color:#fcd34d"><div class="v" style="color:#d97706">'+wa+'</div><div class="l">Warning</div></div>'
    +'<div class="sb" style="border-color:#fde68a"><div class="v" style="color:#ca8a04">'+wc+'</div><div class="l">Watch</div></div>'
    +'<div class="sb" style="border-color:#6ee7b7"><div class="v" style="color:#059669">'+ok+'</div><div class="l">OK &lt;70%</div></div>'
    +'<div class="sb" style="background:#013A2F"><div class="v" style="color:#1CE49B">'+ov+'%</div><div class="l" style="color:#b4f7ca">Overall</div></div>';
}

function updateSortIcons(prefix,col,dir){
  const cols=['n','p','u','up','du','dutil'];
  cols.forEach(c=>{
    const el=document.getElementById(prefix+'i'+c);
    if(el) el.textContent=c===col?(dir===1?'↑':'↓'):'↕';
  });
}

function render(){
  const d=filtered();
  renderStats(d);
  document.getElementById('rcount').textContent='Showing '+d.length+' of '+DATA.length+' organizations';
  // Movers table
  const movers=sortArr(d.filter(o=>o.du!==0||o.dutil!==0),state.mc,state.md);
  const top=movers.slice(0,Math.max(1,Math.ceil(movers.length*.25)));
  document.getElementById('mhdr').textContent='Top Movers ('+top.length+')';
  document.getElementById('mbdy').innerHTML=top.map(rowHtml).join('');
  updateSortIcons('si',state.mc,state.md);
  // All table
  const all=sortArr(d,state.ac,state.ad);
  document.getElementById('ahdr').textContent='All Orgs ('+all.length+')';
  document.getElementById('abdy').innerHTML=all.map(rowHtml).join('');
  updateSortIcons('ai',state.ac,state.ad);
}

// Sort click handlers
document.querySelectorAll('#mtbl th[data-c]').forEach(th=>{
  th.onclick=()=>{
    const c=th.dataset.c;
    if(state.mc===c){state.md*=-1;}else{state.mc=c;state.md=c==='n'?1:-1;}
    render();
  };
});
document.querySelectorAll('#atbl th[data-c]').forEach(th=>{
  th.onclick=()=>{
    const c=th.dataset.c;
    if(state.ac===c){state.ad*=-1;}else{state.ac=c;state.ad=c==='n'?1:-1;}
    render();
  };
});

function onSearch(){state.q=document.getElementById('srch').value;render();}

function drillDown(id){
  const o=DATA.find(x=>x.id===id);if(!o)return;
  const dc=o.dutil>0?'#059669':o.dutil<0?'#dc2626':'#888';
  const ds=o.dutil>0?'+':'';const dus=o.du>0?'+':'';
  document.getElementById('ocnt').innerHTML=
    '<div class="dh">'+o.n+'</div>'
    +'<div class="dsub">ID: '+o.id+'</div>'
    +pbar(o.up)
    +'<div style="margin-top:18px">'
    +'<div class="drow"><span class="dlbl">Status</span><span class="dval">'+badge(o.st)+'</span></div>'
    +'<div class="drow"><span class="dlbl">Returns Purchased</span><span class="dval">'+o.p+'</span></div>'
    +'<div class="drow"><span class="dlbl">Returns Used</span><span class="dval">'+o.u+'</span></div>'
    +'<div class="drow"><span class="dlbl">Utilization</span><span class="dval">'+o.up.toFixed(1)+'%</span></div>'
    +'<div class="drow"><span class="dlbl">Delta Used (vs '+META.snap+')</span><span class="dval" style="color:'+dc+'">'+dus+o.du+'</span></div>'
    +'<div class="drow"><span class="dlbl">Delta Util %</span><span class="dval" style="color:'+dc+'">'+ds+o.dutil.toFixed(1)+'%</span></div>'
    +'</div>';
  document.getElementById('ovrl').classList.add('show');
}
function closeD(){document.getElementById('ovrl').classList.remove('show');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeD();});

render();
</script>
</body>
</html>
